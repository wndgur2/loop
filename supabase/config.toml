# Supabase 로컬 설정 (supabase CLI). 옵션: https://supabase.com/docs/guides/cli/config
# CLI 버전에 따라 키가 다를 수 있다. 불일치 시 `supabase init`으로 재생성 후 project_id만 맞춰도 된다.
project_id = "loop"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
# 모바일 딥링크(scheme=loop). 매직링크/소셜·이메일확인 리다이렉트가 앱으로 돌아오게 한다.
# site_url 은 emailRedirectTo 가 허용목록에 없을 때의 폴백이다 → localhost 가 되면
# 확인 메일 링크가 깨지므로 앱 딥링크로 둔다.
site_url = "loop://auth-callback"
# emailRedirectTo(클라이언트의 EXPO_PUBLIC_AUTH_REDIRECT_URL)는 여기 등록된 값과
# 일치해야 GoTrue 가 그대로 사용한다. 로컬 웹 프리뷰(:8081)도 허용해 둔다.
# 운영 프로젝트는 이 파일이 아니라 대시보드(Authentication > URL Configuration)에서 같은 값을 등록한다.
additional_redirect_urls = [
  "loop://auth-callback",
  "loop://",
  "exp://",
  "http://localhost:8081/auth-callback",
  "http://localhost:8081",
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
# 로컬 개발 편의: 이메일 확인 비활성(운영에선 true 권장)
enable_confirmations = false
# 클라이언트 검증(MIN_PASSWORD_LENGTH, features/auth/validation.ts)과 동기화
minimum_password_length = 6

# Edge Functions — Loopi(작성/회고). 플랫폼이 JWT를 먼저 검증.
[functions.chat]
enabled = true
verify_jwt = true

# 계정 삭제 — 본인 인증(JWT) 후 service_role admin API로 auth.users 삭제(연쇄 삭제).
[functions.delete-account]
enabled = true
verify_jwt = true
