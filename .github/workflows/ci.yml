name: CI

# Minimum quality gates. Mirrors CLAUDE.md §4: typecheck + lint must pass
# before merge; deno check runs only when the Edge Function is touched.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: app (typecheck · lint · format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      # npm workspaces: install + run checks from the repo root. Root scripts
      # fan out across the @loop/ui and loop (mobile) workspaces.
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check

  edge-functions:
    name: edge functions (deno check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno check supabase/functions/chat/index.ts
