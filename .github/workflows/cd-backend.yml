name: CD · backend

# Deploys Supabase migrations + the chat Edge Function to the hosted project.
# Runs only when supabase/ changes land on main, or on manual dispatch.
on:
  push:
    branches: [main]
    paths:
      - 'supabase/**'
  workflow_dispatch:

# Never run two deploys against the same project at once.
concurrency:
  group: cd-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push migrations
        run: supabase db push

      - name: Deploy chat function
        run: supabase functions deploy chat --project-ref "$SUPABASE_PROJECT_ID"
